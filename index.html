<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма совместной закупки</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 500px; background: white; padding: 30px; margin: 20px auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        select, input[type="text"], input[type="tel"], input[type="number"], textarea {
            width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; background-color: #fff;
        }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        button:hover { background-color: #218838; }
        
        /* Стили для мини-корзины */
        .add-btn { background-color: #007bff; }
        .add-btn:hover { background-color: #0069d9; }
        .cart-section { background: #f8f9fa; border: 1px dashed #bbb; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 8px 12px; margin-bottom: 8px; border-radius: 4px; border: 1px solid #ddd; font-size: 14px; }
        .remove-btn { background-color: #dc3545; width: auto; padding: 4px 8px; font-size: 12px; margin: 0; }
        .remove-btn:hover { background-color: #bd2130; }
        
        select:disabled { background-color: #eee; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>Заявка на совместную закупку</h2>
    
    <!-- УКАЖИТЕ СВОЮ ССЫЛКУ ИЗ FORMSPREE НИЖЕ -->
    <form action="https://formspree.io/f/СЮДА_ВСТАВИТЬ_ВАШ_КОД" method="POST" id="orderForm">
        
        <label for="name">Ваше ФИО:</label>
        <input type="text" id="name" name="ФИО" required placeholder="Иван Иванов">

        <label for="phone">Телефон (WhatsApp / Telegram):</label>
        <input type="tel" id="phone" name="Телефон" required placeholder="+7 (999) 000-00-00">

        <hr style="border: 0; border-top: 1px solid #ddd; margin: 20px 0;">

        <!-- Блок выбора товара -->
        <label for="categorySelect">Выберите категорию:</label>
        <select id="categorySelect">
            <option value="">-- Выберите из списка --</option>
            <option value="Кофе">Кофе</option>
            <option value="Чай">Чай</option>
            <option value="Капсулы">Капсулы</option>
            <option value="Дрип-пакеты">Дрип-пакеты</option>
            <option value="Аксессуары">Аксессуары</option>
        </select>

        <label for="productSelect">Выберите товар:</label>
        <select id="productSelect" disabled>
            <option value="">-- Сначала выберите категорию --</option>
        </select>

        <label for="quantity">Количество (шт):</label>
        <input type="number" id="quantity" min="1" value="1">

        <!-- Кнопка добавления в промежуточный список -->
        <button type="button" class="add-btn" id="addToCartBtn">➕ Добавить в заказ</button>

        <!-- Ваш список покупок (Корзина) -->
        <div class="cart-section">
            <label>Ваш заказ:</label>
            <div id="cartList">
                <p style="color: #888; font-style: italic; font-size: 14px; margin: 5px 0 0 0;">В заказе пока нет товаров</p>
            </div>
        </div>

        <!-- Сюда программно запишется весь список для отправки на почту -->
        <textarea id="finalOrderHidden" name="Весь_Заказ" style="display:none;" required></textarea>

        <label for="comment">Комментарий к заказу:</label>
        <textarea id="comment" name="Комментарий" rows="3" placeholder="Дополнительные пожелания..."></textarea>

        <button type="submit" id="submitBtn" disabled style="background-color: #6c757d; cursor: not-allowed;">Отправить заказ</button>
    </form>
</div>

<!-- Подключаем файл с базой товаров -->
<script src="prodacts.js"></script>

<script>
    const categorySelect = document.getElementById('categorySelect');
    const productSelect = document.getElementById('productSelect');
    const quantityInput = document.getElementById('quantity');
    const addToCartBtn = document.getElementById('addToCartBtn');
    const cartList = document.getElementById('cartList');
    const finalOrderHidden = document.getElementById('finalOrderHidden');
    const submitBtn = document.getElementById('submitBtn');

    // Массив, где будем хранить добавленные товары
    let cart = [];

    // 1. Фильтрация товаров по категориям
    categorySelect.addEventListener('change', function() {
        const selectedCategory = this.value;
        productSelect.innerHTML = '<option value="">-- Выберите товар --</option>';
        
        if (selectedCategory) {
            const filteredProducts = products.filter(product => product.category === selectedCategory);
            filteredProducts.forEach(product => {
                const option = document.createElement('option');
                option.value = JSON.stringify(product); // сохраняем весь объект внутри опции
                option.textContent = `${product.name} — ${product.price} руб.`;
                productSelect.appendChild(option);
            });
            productSelect.disabled = false;
        } else {
            productSelect.disabled = true;
            productSelect.innerHTML = '<option value="">-- Сначала выберите категорию --</option>';
        }
    });

    // 2. Добавление товара в корзину
    addToCartBtn.addEventListener('click', function() {
        if (!productSelect.value) {
            alert('Пожалуйста, выберите товар из списка.');
            return;
        }

        const productData = JSON.parse(productSelect.value);
        const quantity = parseInt(quantityInput.value) || 1;

        // Проверяем, есть ли уже такой товар в корзине
        const existingItem = cart.find(item => item.id === productData.id);
        if (existingItem) {
            existingItem.quantity += quantity;
        } else {
            cart.push({
                id: productData.id,
                name: productData.name,
                price: productData.price,
                code: productData.code,
                quantity: quantity
            });
        }

        // Сбрасываем выбор количества на 1
        quantityInput.value = 1;
        updateCart();
    });

    // 3. Обновление внешнего вида корзины и скрытого поля
    function updateCart() {
        cartList.innerHTML = '';
        
        if (cart.length === 0) {
            cartList.innerHTML = '<p style="color: #888; font-style: italic; font-size: 14px; margin: 5px 0 0 0;">В заказе пока нет товаров</p>';
            finalOrderHidden.value = '';
            submitBtn.disabled = true;
            submitBtn.style.backgroundColor = '#6c757d';
            submitBtn.style.cursor = 'not-allowed';
            return;
        }

        let textForEmail = '';
        
        cart.forEach((item, index) => {
            // Формируем красивую строчку для админа
            textForEmail += `${index + 1}) ${item.name} [Код: ${item.code || 'нет'}] — ${item.quantity} шт. (на сумму ${item.price * item.quantity} руб.)\n`;

            // Создаем строчку в интерфейсе для пользователя
            const itemDiv = document.createElement('div');
            itemDiv.className = 'cart-item';
            itemDiv.innerHTML = `
                <span>${item.name} <br><b>${item.quantity} шт.</b> x ${item.price} р.</span>
                <button type="button" class="remove-btn" onclick="removeFromCart('${item.id}')">❌</button>
            `;
            cartList.appendChild(itemDiv);
        });

        // Записываем собранный текст в скрытое поле
        finalOrderHidden.value = textForEmail;
        
        // Активируем кнопку отправки формы
        submitBtn.disabled = false;
        submitBtn.style.backgroundColor = '#28a745';
        submitBtn.style.cursor = 'pointer';
    }

    // 4. Удаление товара из корзины
    window.removeFromCart = function(productId) {
        cart = cart.filter(item => item.id !== productId);
        updateCart();
    };
</script>

</body>
</html>
